# ============================
# 云智购 yzhimall
# 一键启动全部服务
# 使用: docker-compose up -d
# ============================
services:

  # ---------- MySQL ----------
  mysql:
    image: mysql:8.0
    container_name: yzhimall-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: yzhimall
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yzhimall

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: yzhimall-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass "" --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yzhimall

  # ---------- Flask API ----------
  flask:
    build:
      context: .
      dockerfile: docker/Dockerfile.flask
    container_name: yzhimall-flask
    restart: always
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: "1"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: yzhimall
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - yzhimall

  # ---------- Celery Worker ----------
  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: yzhimall-celery
    restart: always
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: yzhimall
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - yzhimall

  # ---------- Celery Beat (定时任务) ----------
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: yzhimall-celery-beat
    restart: always
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
      - mysql
    networks:
      - yzhimall

volumes:
  mysql_data:
  redis_data:

networks:
  yzhimall:
    driver: bridge
